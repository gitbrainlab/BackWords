<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      // GitHub Pages SPA routing trick (custom domain at root /).
      // Encode the path as a query parameter and redirect to /, where
      // index.html decodes it and restores the real URL via history.replaceState.
      // See: https://github.com/rafgraph/spa-github-pages
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        '/?/' +
        l.pathname.slice(1).replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
    <title>BackWords</title>
  </head>
  <body>
    <p>Redirecting…</p>
  </body>
</html>
